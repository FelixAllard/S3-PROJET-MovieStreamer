name: Quarkus Run

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Docker
        run: docker --version

      - name: Start infrastructure (Docker Compose)
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for infrastructure
        run: sleep 20

      # 🔥 THIS is your "message.main build"
      - name: Build message.main (Quarkus app)
        run: ./gradlew :build -x test

      # 🚀 Start Quarkus app from build output
      - name: Start Quarkus application
        run: |
          nohup java -jar build/quarkus-app/quarkus-run.jar > app.log 2>&1 &
          echo $! > app.pid

      # ⏳ Wait until app is REALLY ready
      - name: Wait for application startup
        run: |
          for i in {1..40}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8888/q/health/ready)

            if [ "$STATUS" = "200" ]; then
              echo "Application is READY"
              exit 0
            fi

            echo "Waiting... status=$STATUS"
            sleep 3
          done

          echo "App failed to start"
          cat app.log
          exit 1

      # 🔍 Swagger checks
      - name: Check Swagger UI
        run: curl --fail http://localhost:8888/q/swagger-ui

      - name: Check OpenAPI JSON
        run: curl --fail http://localhost:8888/q/openapi

      # 🧹 Cleanup
      - name: Stop application
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi

      - name: Stop Docker services
        if: always()
        run: docker compose -f docker/docker-compose.yml down