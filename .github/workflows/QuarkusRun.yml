name: Quarkus Run

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check Docker
        run: docker --version

      - name: Start infrastructure (Docker Compose)
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for infrastructure
        run: sleep 15

      - name: Run tests
        run: ./gradlew test

      - name: Build application
        run: ./gradlew build -x test

      # IMPORTANT: correct Quarkus startup
      - name: Start Quarkus application
        run: java -jar build/quarkus-app/quarkus-run.jar &

      - name: Wait for application startup (health-based)
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8888/q/health/ready && exit 0
            echo "Waiting for app..."
            sleep 2
          done
          exit 1

      # Swagger check (your request)
      - name: Check Swagger UI
        run: curl --fail http://localhost:8888/q/swagger-ui

      - name: Check OpenAPI JSON
        run: curl --fail http://localhost:8888/q/openapi

      - name: Stop Docker services
        if: always()
        run: docker compose -f docker/docker-compose.yml down

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**